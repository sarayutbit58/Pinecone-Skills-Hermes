pinecone_skill_router:
  enabled: true
  auto_index_on_start: true

  pinecone:
    api_key: "${PINECONE_API_KEY}"
    transport: "sdk"
    cloud: "aws"
    region: "us-east-1"
    index_name: "hermes-skills"
    namespace: "default"

  embeddings:
    provider: "openai"
    model: "text-embedding-3-small"

  skills:
    paths:
      - "~/.hermes/skills"

  routing:
    top_k: 8
    auto_load_threshold: 0.84
    suggest_threshold: 0.74

  safety:
    require_toolset_match: true
    required_toolsets: []
